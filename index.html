<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apollo Avatar Gallery</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="gallery-header">
    <h1>Apollo Avatar Gallery</h1>
    <p class="subtitle">AI-generated themed avatars — Use filters or search to explore styles</p>
  </header>

  <nav class="filter-nav" aria-label="Theme filters">
    <div class="filter-nav-inner">
      <button class="filter-btn active" data-filter="all">All (193)</button>
      <button class="filter-btn" data-filter="fantasy">Fantasy (13)</button>
      <button class="filter-btn" data-filter="sci-fi">Sci-Fi (16)</button>
      <button class="filter-btn" data-filter="nature">Nature (14)</button>
      <button class="filter-btn" data-filter="abstract">Abstract (26)</button>
      <button class="filter-btn" data-filter="mythology">Mythology (12)</button>
      <button class="filter-btn" data-filter="lotus">Lotus (69)</button>
      <button class="filter-btn" data-filter="tattoo">Tattoo (13)</button>
      <button class="filter-btn" data-filter="watercolor">Watercolor (2)</button>
      <button class="filter-btn" data-filter="minimalist">Minimalist (4)</button>
      <button class="filter-btn" data-filter="portrait">Portrait (18)</button>
      <button class="filter-btn" data-filter="animals">Animals (3)</button>
      <button class="filter-btn" data-filter="retro">Retro (3)</button>
    </div>
  </nav>

  <div class="search-container" aria-label="Search avatars">
    <input type="search" id="searchInput" class="search-input" placeholder="Search by prompt..." aria-label="Search avatars by prompt">
    <button id="searchClear" class="search-clear" aria-label="Clear search" hidden>&times;</button>
  </div>

  <main class="gallery-main">
    <div class="gallery-grid" id="galleryGrid" role="list"></div>
    <p class="no-results" id="noResults" hidden>No avatars match the selected filter.</p>
  </main>

  <!-- Lightbox for image preview -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Avatar preview" hidden>
    <button class="lightbox-close" id="lightboxClose" aria-label="Close preview">&times;</button>
    <button class="lightbox-nav lightbox-prev" id="lightboxPrev" aria-label="Previous image">&lsaquo;</button>
    <div class="lightbox-content">
      <img id="lightboxImage" src="" alt="">
      <div class="lightbox-info">
        <h3 id="lightboxTitle"></h3>
        <p id="lightboxPrompt"></p>
        <span id="lightboxTheme" class="theme-badge"></span>
      </div>
    </div>
    <button class="lightbox-nav lightbox-next" id="lightboxNext" aria-label="Next image">&rsaquo;</button>
  </div>

  <!-- Style Reference Panel (Side Panel) -->
  <div class="style-panel-overlay" id="stylePanelOverlay" hidden></div>
  <aside class="style-panel" id="stylePanel" role="dialog" aria-modal="true" aria-label="Style Reference" hidden>
    <div class="style-panel-header">
      <h2 id="stylePanelTitle">Style Reference</h2>
      <button class="style-panel-close" id="stylePanelClose" aria-label="Close panel">&times;</button>
    </div>
    <div class="style-panel-body" id="stylePanelBody">
      <!-- Dynamic content loaded based on step -->
    </div>
    <div class="style-panel-footer" id="stylePanelFooter">
      <!-- Dynamic buttons based on step -->
    </div>
  </aside>

  <footer class="gallery-footer">
    <p>Images generated via <a href="https://pollinations.ai" target="_blank" rel="noopener">Pollinations.ai</a> (Flux model) — free AI image generation API.</p>
    <p class="last-updated" id="lastUpdated"></p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
