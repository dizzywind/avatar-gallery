<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lotus Gallery — Apollo Avatar Gallery</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="lotus-styles.css">
</head>
<body>
  <header class="gallery-header lotus-header">
    <a href="index.html" class="back-link" aria-label="Back to main gallery">← Back to Gallery</a>
    <h1>Lotus Gallery</h1>
    <p class="subtitle">Sacred lotus avatars — 5 artistic interpretations of the divine bloom</p>
  </header>

  <main class="gallery-main">
    <div class="gallery-grid" id="lotusGalleryGrid" role="list"></div>
    <p class="no-results" id="noResults" hidden>No lotus avatars found.</p>
  </main>

  <!-- Lightbox for image preview -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Lotus avatar preview" hidden>
    <button class="lightbox-close" id="lightboxClose" aria-label="Close preview">&times;</button>
    <button class="lightbox-nav lightbox-prev" id="lightboxPrev" aria-label="Previous image">&lsaquo;</button>
    <div class="lightbox-content">
      <img id="lightboxImage" src="" alt="">
      <div class="lightbox-info">
        <h3 id="lightboxTitle"></h3>
        <p id="lightboxPrompt"></p>
        <span id="lightboxTheme" class="theme-badge lotus-badge">Lotus</span>
      </div>
    </div>
    <button class="lightbox-nav lightbox-next" id="lightboxNext" aria-label="Next image">&rsaquo;</button>
  </div>

  <footer class="gallery-footer">
    <p>Images generated via <a href="https://pollinations.ai" target="_blank" rel="noopener">Pollinations.ai</a> (Flux model) — free AI image generation API.</p>
    <p class="lotus-attribution">Lotus theme artwork generated by Apollo via Pollinations.ai</p>
  </footer>

  <script src="lotus-gallery.js"></script>
</body>
</html>
